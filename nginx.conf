# Nginx config for akeystudio_v2 (port 8080)
# Use: sudo nginx -c /path/to/akeystudio_v2/nginx.conf
# Or copy this server block into your main nginx config (e.g. /etc/nginx/sites-available/default)

server {
    listen 8080;
    server_name localhost;
    root /Users/kelvinlee/Documents/Web-Dev/2. Leaders Hub/akeystudio_v2;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Ensure 0243.txt and other static files are served with correct type
    location ~* \.(txt|js|css|png|jpg|jpeg|gif|ico|webp|svg)$ {
        add_header Cache-Control "public, max-age=3600";
    }
}
